apiVersion: apps/v1
kind: Deployment
metadata:
  name: ci-demo-app
  namespace: ci-demo
  labels:
    app: ci-demo-app
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  selector:
    matchLabels:
      app: ci-demo-app
  template:
    metadata:
      labels:
        app: ci-demo-app
      annotations:
        prometheus.io/scrape: "false"
    spec:
      containers:
      - name: ci-demo-app
        image: 942165495572.dkr.ecr.ap-south-1.amazonaws.com/python/demo:latest
        imagePullPolicy: Always
        ports:
        - name: http
          containerPort: 8000
          protocol: TCP
        livenessProbe:
          httpGet:
            path: /
            port: http
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /
            port: http
          initialDelaySeconds: 10
          periodSeconds: 5
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 512Mi
        securityContext:
          runAsNonRoot: true
          runAsUser: 1000
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
              - ALL

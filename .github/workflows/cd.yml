name: CD Pipeline - Deploy to EKS

on:
  workflow_run:
    workflows: ["Python CI Pipeline"]
    types: [completed]
    branches:
      - main

env:
  AWS_REGION: ap-south-1
  ECR_REPOSITORY: python/demo
  CLUSTER_NAME: ci-demo-eks
  AWS_ACCOUNT_ID: 942165495572

jobs:
  deploy:
    name: Deploy to EKS
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ env.AWS_ACCOUNT_ID }}:role/GitHubECRRole
          aws-region: ${{ env.AWS_REGION }}

      - name: Get EKS cluster credentials
        run: |
          aws eks update-kubeconfig --region ${{ env.AWS_REGION }} --name ${{ env.CLUSTER_NAME }}

      - name: Extract short SHA
        id: sha
        run: |
          SHORT_SHA=${{ github.sha }}
          SHORT_SHA=${SHORT_SHA:0:7}
          echo "short-sha=${SHORT_SHA}" >> $GITHUB_OUTPUT

      - name: Update deployment manifest with new image tag
        run: |
          # Update the deployment.yaml with the new image tag
          sed -i 's|image: 942165495572.dkr.ecr.ap-south-1.amazonaws.com/python/demo:.*|image: 942165495572.dkr.ecr.ap-south-1.amazonaws.com/python/demo:${{ steps.sha.outputs.short-sha }}|g' k8s/deployment.yaml

      - name: Commit and push updated deployment
        run: |
          git config --global user.email "github-actions[bot]@github.com"
          git config --global user.name "GitHub Actions"
          git add k8s/deployment.yaml
          git commit -m "chore: Update deployment image to ${{ steps.sha.outputs.short-sha }}" || echo "No changes to commit"
          git push origin main || echo "No changes to push"
        continue-on-error: true

      - name: Trigger ArgoCD sync (optional - speeds up synchronization)
        continue-on-error: true
        run: |
          # Force ArgoCD to check git sooner (optional optimization)
          # ArgoCD will auto-detect changes and sync per its sync interval
          kubectl patch application ci-demo-app -n argocd --type merge -p '{"metadata":{"annotations":{"argocd.argoproj.io/refresh":"hard"}}}'
          echo ""
          echo "=== Load Balancer URL ==="
          kubectl get svc ci-demo-app -n ci-demo -o jsonpath='{.status.loadBalancer.ingress[0].hostname}'

      - name: Run smoke tests
        continue-on-error: true
        run: |
          # Get the LoadBalancer IP/DNS
          LB_URL=$(kubectl get svc ci-demo-app -n ci-demo -o jsonpath='{.status.loadBalancer.ingress[0].hostname}')
          
          if [ -z "$LB_URL" ]; then
            LB_URL=$(kubectl get svc ci-demo-app -n ci-demo -o jsonpath='{.status.loadBalancer.ingress[0].ip}')
          fi
          
          if [ ! -z "$LB_URL" ]; then
            echo "Testing endpoint: http://$LB_URL"
            curl -f http://$LB_URL/ || echo "Service not ready yet"
          else
            echo "LoadBalancer URL not ready yet"
          fi

  notify:
    name: Notify deployment status
    runs-on: ubuntu-latest
    needs: deploy
    if: always()
    
    steps:
      - name: Deployment result
        run: |
          if [ "${{ needs.deploy.result }}" == "success" ]; then
            echo "✅ Deployment successful!"
            exit 0
          else
            echo "❌ Deployment failed!"
            exit 1
          fi
